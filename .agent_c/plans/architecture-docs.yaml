    completion_signoff_by: Archie
    requires_completion_signoff: 'true'
    lessons_learned: []
    active: false
  buzzer-nylon:
    id: buzzer-nylon
    title: ARCH-INFRASTRUCTURE — Infrastructure Layer Design
    description: SQLAlchemy ORM models, repository implementations, mappers, Parcel
