id: architecture-docs
title: Architecture Documentation Suite
description: 'Produce all Clean Architecture design documents for the Delivery Tracking
  Web Service. Working inward → outward: Overview → Domain → Application → Infrastructure
  → Presentation. All requirements read and understood before any document written.'
tasks:
