    priority: high
    completed: true
    parent_id: null
    context: ''
    child_tasks: []
    created_at: '2026-04-01T12:19:29.695538'
    updated_at: '2026-04-01T12:19:29.695540'
    completed_at: '2026-04-01T12:23:40.643176'
    completion_report: 'ARCH-DOMAIN.md written. Covers: all five entities with full
      field specs and key invariants, SemanticStatus and LifecycleGroup value objects
