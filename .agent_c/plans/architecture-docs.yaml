    id: initial-tourist
    title: ARCH-OVERVIEW — System Architecture Overview
    description: 'Master architecture document: four Clean Architecture layers, module
      structure, dependency rule, key design patterns, data flows, cross-cutting concerns,
      and known gaps (token_version, structure departure).'
    priority: high
    completed: true
    parent_id: null
    context: ''
    child_tasks: []
