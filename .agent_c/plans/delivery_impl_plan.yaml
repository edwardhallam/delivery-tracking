  iris-ethnic:
    id: iris-ethnic
    title: 5.3 — JWT authentication (token creation and validation)
    description: Implement JWT token creation functions and the get_current_user FastAPI
      dependency implementing the 6-step validation chain. This is a critical security
      component — all 6 validation steps must be present and failures must all return
      the same 401 response.
    priority: high
    completed: true
    parent_id: arizona-culture
    context: "Architecture ref: ARCH-PRESENTATION §5. Requirements: SEC-REQ-009–017,\
      \ API-REQ-001–004, SEC-REQ-025–027.\n\nFile: app/presentation/auth.py (or auth\
      \ portion of dependencies.py)\n\nToken creation:\n  create_access_token(user:\
      \ User) → tuple[str, int]:\n    claims = {sub: user.username, type: \"access\"\
      , token_version: user.token_version,\n              iat: now_ts, exp: (now +\
      \ access_ttl).timestamp()}\n    token = jose.jwt.encode(claims, settings.jwt_secret_key.get_secret_value(),\
      \ algorithm=\"HS256\")\n    return token, settings.access_token_expire_minutes\
      \ * 60\n\n  create_refresh_token(user: User) → str:\n    claims = {sub: user.username,\
      \ type: \"refresh\", token_version: user.token_version,\n              iat:\
      \ now_ts, exp: (now + refresh_ttl).timestamp()}\n    return jose.jwt.encode(claims,\
      \ ...)\n\nToken validation — get_current_user dependency (6-step chain, SEC-REQ-015):\n\
      \  Step 1: Token present in Authorization: Bearer header  → 401 if missing\n\
      \  Step 2: JWT signature valid (jose.jwt.decode)          → 401 if JWTError\n\
      \  Step 3: Not expired (handled by jose decode)           → 401 if ExpiredSignatureError\n\
      \  Step 4: type claim == \"access\"                         → 401 if wrong type\
      \ (SEC-REQ-012)\n  Step 5: User exists AND is_active == True              →\
      \ 401 (masked — SEC-REQ-016)\n  Step 6: token_version matches users.token_version\
      \      → 401 (SEC-REQ-017, API-REQ-004)\n\n  ALL failures raise same HTTPException(401)\
      \ with same generic message\n  ALL failures logged at INFO level with reason\
      \ (NOT in response body — SEC-REQ-016, SEC-REQ-059)\n  User identity comes from\
      \ this dependency ONLY — never from request body (SEC-REQ-027)\n\n  oauth2_scheme\
      \ = OAuth2PasswordBearer(tokenUrl=\"/api/auth/login\", auto_error=False)\n \
      \   — auto_error=False required so we can provide our own error envelope (API-REQ-005)\n\
      \nget_refresh_token_claims dependency:\n  Reads refresh_token cookie from request\n\
      \  Validates signature + expiry + type==\"refresh\"\n  Returns RefreshTokenClaimsDTO\
      \ (does NOT validate token_version against DB — that's use case)\n\nDeliverables:\
      \ JWT functions + get_current_user dependency.\nAcceptance criteria: get_current_user\
      \ raises 401 for: no token, bad signature, expired, wrong type, inactive user,\
      \ version mismatch. All 401 responses have identical response body. Wrong type\
      \ claim (using refresh token on protected endpoint) returns 401, not 200."
    child_tasks: []
    created_at: '2026-04-01T12:50:08.852723'
    updated_at: '2026-04-01T12:50:08.852727'
    completed_at: '2026-04-01T14:52:19.723867'
    completion_report: 'Created app/presentation/auth.py. Token creation: create_access_token(user)
      returns (signed_jwt, expires_in_seconds) with claims {sub, type="access", token_version,
      iat, exp}; create_refresh_token(user) returns signed_jwt with type="refresh".
      Validation: validate_access_token_claims() performs steps 1-4 (token present,
      signature valid, not expired, type=="access") — all failures raise the single
