      Nginx config, and environment file template. Nothing domain-specific is written
      here — this phase produces the chassis that every subsequent phase builds into.'
    priority: high
    completed: true
    parent_id: null
    context: 'Arch refs: ARCH-OVERVIEW §3 (module structure), ARCH-INFRASTRUCTURE
      §2.3 (Alembic), ARCH-PRESENTATION §3 (lifespan/entrypoint), 08-deployment requirements
      throughout. ADRs 001–006 are the structural commitments. No application code
      written in this phase.'
