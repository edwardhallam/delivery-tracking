    id: blue-charm
    title: 5.5 — Auth router
    description: 'Implement the three authentication endpoints: login (with rate limiting
      and cookie issuance), refresh (cookie-based), and logout (cookie clearing and
      token version increment).'
    priority: high
    completed: true
    parent_id: arizona-culture
    context: "Architecture ref: ARCH-PRESENTATION §7.1. Requirements: API-REQ-006–009,\
      \ SEC-REQ-018–024, SEC-REQ-035–040.\n\nFile: app/presentation/routers/auth_router.py\n\
      \nPOST /api/auth/login:\n  1. source_ip = get_client_ip(request, trust_proxy=settings.trust_proxy_headers)\n\
      \     — reads X-Real-IP or X-Forwarded-For if TRUST_PROXY_HEADERS=true (SEC-REQ-040)\n\
      \  2. await rate_limiter.check(source_ip)  → 429 with Retry-After if exceeded\
      \ (SEC-REQ-038–039)\n  3. try: user = await use_case.execute(LoginCredentialsDTO(username,\
      \ password))\n     except InvalidCredentialsError: await rate_limiter.record_failure(source_ip);\
      \ raise 401\n     except AccountDisabledError: raise 403 (BUT do not leak whether\
      \ username exists for 401 path)\n  4. await rate_limiter.reset(source_ip)  —\
      \ success clears counter (SEC-REQ-037)\n  5. access_token, expires_in = create_access_token(user)\n\
      \  6. refresh_token_str = create_refresh_token(user)\n  7. response = JSONResponse(LoginResponse(...).model_dump())\n\
      \  8. response.set_cookie(\"refresh_token\", value=refresh_token_str,\n    \
      \   httponly=True, samesite=\"strict\", path=\"/api/auth\",\n       max_age=settings.refresh_token_expire_days\
      \ * 86400,\n       secure=settings.cookie_secure)  (SEC-REQ-022–024)\n  9. log\
      \ INFO: successful login (username, source_ip — NOT password)\n\nPOST /api/auth/refresh:\n\
      \  1. claims = get_refresh_token_claims(request)  — validates cookie\n  2. user\
      \ = await use_case.execute(claims)  — validates token_version against DB (API-REQ-008)\n\
      \  3. Return new access token (refresh token NOT rotated — SEC-REQ-019)\n\n\
      POST /api/auth/logout:\n  1. current_user = Depends(get_current_user)  — requires\
      \ valid access token\n  2. await use_case.execute(current_user.id)  — increments\
      \ token_version (SEC-REQ-020)\n  3. response = Response(status_code=204)\n \
      \ 4. response.delete_cookie(\"refresh_token\", path=\"/api/auth\", samesite=\"\
      strict\")\n  5. log INFO: logout (username)\n\nException → HTTP mapping (for\
      \ this router):\n  InvalidCredentialsError → 401 INVALID_CREDENTIALS  (API-REQ-006)\n\
      \  AccountDisabledError → 403 ACCOUNT_DISABLED\n  rate limit exceeded → 429\
      \ RATE_LIMITED (SEC-REQ-038)\n\nDeliverables: app/presentation/routers/auth_router.py.\n\
      Acceptance criteria: Login success sets httpOnly cookie. Login failure for unknown\
      \ user and wrong password both return identical 401 responses. Rate limiter\
      \ check happens BEFORE use case call. Cookie path is /api/auth. Logout returns\
      \ 204 with deleted cookie."
