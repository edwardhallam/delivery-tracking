      File: app/presentation/middleware/security_headers.py — SecurityHeadersMiddleware(BaseHTTPMiddleware):\n\
      \  Adds to ALL responses (API-REQ-021, SEC-REQ-031):\n    X-Content-Type-Options:\
      \ nosniff\n    X-Frame-Options: DENY\n    X-XSS-Protection: 0\n    Referrer-Policy:\
      \ strict-origin-when-cross-origin\n  Removes Server header (SEC-REQ-034): response.headers.pop(\"\
      server\", None)\n\nFile: app/presentation/middleware/rate_limiter.py — RateLimiter:\n\
      \  See ARCH-PRESENTATION §8.2 for full implementation\n  Sliding window: dict[ip_str,\
      \ list[datetime]]\n  WINDOW_SECONDS=900, MAX_FAILURES=10 (SEC-REQ-035)\n  check(ip):\
      \ raises 429 with Retry-After header if threshold exceeded (SEC-REQ-038–039)\n\
      \  record_failure(ip): adds timestamp to failures list\n  reset(ip): removes\
      \ IP from dict on successful login (SEC-REQ-037)\n  asyncio.Lock for thread\
      \ safety\n\nException handlers:\n  validation_exception_handler(RequestValidationError)\
      \ → 422 with standard error envelope (API-REQ-005)\n  generic_exception_handler(Exception)\
      \ → 500 with INTERNAL_ERROR envelope (API-REQ-025)\n    — logs full traceback\
      \ server-side; returns only generic message to client\n  app_exception_handler:\
      \ maps domain/application exceptions to HTTP responses\n\nFile: app/main.py\
      \ — create_app() + lifespan:\n  FastAPI(docs_url=None/redoc_url=None in production\
      \ — API-REQ-023)\n  Middleware order (ARCH-PRESENTATION §3):\n    1. SecurityHeadersMiddleware\
      \ (always)\n    2. CORSMiddleware only if environment==\"development\" (SEC-REQ-029–030)\n\
      \  Exception handlers: RequestValidationError, Exception (generic catch-all)\n\
      \  Router includes: auth_router prefix=/api/auth, deliveries_router prefix=/api/deliveries,\
      \ system_router prefix=/api\n\n  lifespan startup sequence (ARCH-OVERVIEW §6):\n\
      \    1. http_client = httpx.AsyncClient(verify=True) — shared across poll cycles\
      \ (POLL-REQ-012)\n    2. carrier_cache = CarrierCache(http_client); asyncio.create_task(carrier_cache.refresh())\n\
      \    3. parcel_client = ParcelAPIClient(http_client, api_key, ...)\n    4. scheduler\
      \ = AsyncIOScheduler()\n    5. register_poll_job(scheduler, parcel_client, settings)\n\
      \    6. register_carrier_refresh_job(scheduler, carrier_cache)\n    7. scheduler.start()\n\
      \    8. asyncio.create_task(_run_poll_cycle(parcel_client))  — cold-start (POLL-REQ-003)\n\
      \    9. Store all on app.state for DI access\n\n  lifespan shutdown:\n    scheduler.shutdown(wait=True)\
      \  — allow in-progress poll (POLL-REQ-002, max 30s)\n    await http_client.aclose()\n\
      \    await engine.dispose()\n\napp = create_app()  — module-level; Uvicorn imports\
      \ this\n\nDeliverables: app/presentation/middleware/security_headers.py, app/presentation/middleware/rate_limiter.py,\
      \ app/main.py.\nAcceptance criteria: All responses include X-Content-Type-Options\
      \ and X-Frame-Options headers. No Server header in response. OpenAPI docs not\
      \ accessible in production (ENVIRONMENT=production → /api/docs returns 404).\
      \ CORS not configured in production. lifespan creates scheduler and cold-start\
      \ task. 500 response has standard envelope (no stack trace)."
