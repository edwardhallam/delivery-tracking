      \ that keeps domain entities clean of SQLAlchemy metadata.\n\nPattern (each\
      \ mapper):\n  class XxxMapper:\n    @staticmethod\n    def to_domain(orm: XxxORM)\
      \ -> Xxx:\n        return Xxx(field1=orm.field1, ...)\n    @staticmethod\n \
      \   def to_orm(entity: Xxx) -> XxxORM:\n        return XxxORM(field1=entity.field1,\
      \ ...)\n\nFile: app/infrastructure/mappers/delivery_mapper.py — DeliveryMapper\n\
      \  to_domain: maps DeliveryORM → Delivery\n    Key: SemanticStatus(orm.semantic_status)\
      \ — convert str back to enum\n  to_orm: maps Delivery → DeliveryORM\n\nFile:\
      \ app/infrastructure/mappers/delivery_event_mapper.py — DeliveryEventMapper\n\
      \  to_domain: DeliveryEventORM → DeliveryEvent\n  to_orm: DeliveryEvent → DeliveryEventORM\n\
      \nFile: app/infrastructure/mappers/status_history_mapper.py — StatusHistoryMapper\n\
      \  to_domain: StatusHistoryORM → StatusHistory\n    Key: Optional[SemanticStatus(orm.previous_semantic_status)]\
      \ for nullable field\n  to_orm: StatusHistory → StatusHistoryORM\n\nFile: app/infrastructure/mappers/user_mapper.py\
      \ — UserMapper\n  to_domain: UserORM → User\n  to_orm: User → UserORM\n\nFile:\
      \ app/infrastructure/mappers/poll_log_mapper.py — PollLogMapper\n  to_domain:\
      \ PollLogORM → PollLog\n    Key: PollOutcome(orm.outcome) — convert str back\
      \ to enum\n\nAll mappers import from both domain entities AND ORM models.\n\
      They may NOT contain any SQL queries or business logic.\n\nDeliverables: 5 mapper\
      \ files + app/infrastructure/mappers/__init__.py.\nAcceptance criteria: DeliveryMapper.to_domain(orm_instance)\
      \ returns a Delivery dataclass, not a SQLAlchemy object. Round-trip test: to_domain(to_orm(entity))\
      \ produces entity with same field values. SemanticStatus and PollOutcome enum\
      \ conversions handled correctly. No DB session required to run mapper tests."
