    updated_at: '2026-04-01T12:48:49.751366'
    completed_at: '2026-04-01T14:30:57.169902'
    completion_report: 'CarrierCache implements AbstractCarrierCache. Takes AbstractParcelAPIClient
      (not httpx.AsyncClient directly) — delegates to parcel_client.get_carriers().
      _carriers: list[CarrierDTO] = [], _cached_at: Optional[datetime] = None, _CARRIER_CACHE_TTL_SECONDS
      = 24*60*60. get_carriers() synchronous: returns ''unavailable'' if _cached_at
      is None; computes age via datetime.now(tz=UTC) - _cached_at; returns ''fresh''
      if age < TTL else ''stale''. NO outbound HTTP call (API-REQ-019). refresh()
      async: calls parcel_client.get_carriers(), updates _carriers and _cached_at
