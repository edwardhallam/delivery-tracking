lessons_learned:
- id: burma
  lesson: TIMESTAMPTZ is not exported from sqlalchemy.dialects.postgresql in SQLAlchemy
    2.0. Use TIMESTAMP(timezone=True) (imported from sqlalchemy) instead. The PostgreSQL
    DDL output is identical — both produce TIMESTAMPTZ columns — but only the latter
    is valid in code.
  learned_task_id: domino-senior
  created_at: '2026-04-01T14:31:31.691632'
- id: vital
  lesson: pydantic-settings evaluates field annotations at runtime via get_type_hints().
    The str | None union syntax (Python 3.10+) must be replaced with Optional[str]
    and from __future__ import annotations added to config.py for the code to work
    with any Python 3.9 tooling (local dev, CI pre-Docker). The Docker image runs
    Python 3.12 where str | None is valid, but local test runs will fail without this
    fix.
  learned_task_id: system-gyro
  created_at: '2026-04-01T14:31:31.758620'
- id: veteran
  lesson: Starlette's BaseHTTPMiddleware in versions ≥0.29 bypasses exception handlers
    registered via add_exception_handler(Exception, ...) because it propagates route
    exceptions past ExceptionMiddleware. Pure ASGI middleware (implementing __call__(scope,
    receive, send) directly) should be used for security headers and similar cross-cutting
    concerns. The security_headers.py middleware was rewritten from BaseHTTPMiddleware
    to pure ASGI to fix this.
  learned_task_id: rose-marble
  created_at: '2026-04-01T15:50:54.988507'
- id: mobile
  lesson: passlib[bcrypt] 1.7.4 is incompatible with bcrypt ≥4.0 — passlib's detect_wrap_bug()
    tries to hash a >72-byte string which newer bcrypt rejects with ValueError. Auth
    unit tests must mock passlib.hash.bcrypt.verify and _dummy_hash rather than computing
    real hashes. This is an environment-level compatibility issue; when the Dockerfile
    runs Python 3.12 with pinned deps it may not occur, but tests running locally
    on Python 3.9 with system bcrypt will hit it.
  learned_task_id: gondola-viva
  created_at: '2026-04-01T15:51:02.938078'
- id: normal
  lesson: httpx ASGITransport does NOT run the FastAPI lifespan startup sequence.
    Any app.state attributes set in the lifespan (carrier_cache, polling_scheduler)
    are not available during tests. The correct pattern is to override get_carrier_cache
    and get_scheduler_state via app.dependency_overrides, not to set app.state directly.
    The presentation test conftest now sets these overrides automatically in the client
    fixture.
  learned_task_id: rose-marble
  created_at: '2026-04-01T15:51:11.954974'
