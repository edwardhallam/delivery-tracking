      \ — Pydantic models for Parcel API response:\n  ParcelAPIEvent(BaseModel): description:\
      \ str, date: str (NEVER parse — DM-BR-009),\n    location: Optional[str], additional_info:\
      \ Optional[str]\n  ParcelAPIDelivery(BaseModel): tracking_number: str, carrier_code:\
      \ str, description: str,\n    extra_information: Optional[str], status_code:\
      \ int,\n    date_expected: Optional[str] (raw — DM-BR-025), date_expected_end:\
      \ Optional[str],\n    timestamp_expected: Optional[int] (Unix epoch — convert\
      \ to UTC datetime on parse),\n    timestamp_expected_end: Optional[int], events:\
      \ list[ParcelAPIEvent]=[]\n  ParcelAPIResponse(BaseModel): success: bool, deliveries:\
      \ list[ParcelAPIDelivery]=[],\n    error_message: Optional[str]\n\nFile: app/infrastructure/parcel_api/client.py\
      \ — ParcelAPIClient(AbstractParcelAPIClient):\n  __init__(self, client: httpx.AsyncClient,\
      \ api_key: str, timeout: int=30, max_retries: int=3)\n  _api_key stored in private\
      \ attribute — NEVER exposed via any method or log\n  \n  RETRY_DELAYS = [15,\
      \ 60, 120]  (POLL-REQ-026)\n  \n  async get_deliveries() → list[ParcelDeliveryDTO]:\n\
      \    for attempt in range(max_retries + 1):\n      response = await client.get(\"\
      /external/deliveries/\",\n        params={\"filter_mode\": \"recent\"},  (POLL-REQ-011)\n\
      \        headers={\"api-key\": self._api_key},  (POLL-REQ-010 — not Authorization\
      \ header)\n        timeout=self._timeout)\n      \n      429 → raise ParcelRateLimitError\
      \ immediately (non-retryable, POLL-REQ-024)\n      401 → raise ParcelAuthError\
      \ immediately (non-retryable, POLL-REQ-025)\n      ≥500 → ParcelServerError\
      \ → retry with backoff\n      ≥400 → ParcelServerError (client error, no retry)\n\
      \      \n      body = response.json()\n      if not body.success → raise ParcelResponseError(body.error_message)\n\
      \      return self._parse_deliveries(body.deliveries)  — empty list is valid\
      \ (POLL-REQ-014)\n    \n    On retry: log WARNING with attempt number and delay\
      \ (POLL-REQ-027)\n      — Log must NOT include api_key value (POLL-REQ-033)\n\
      \    On all retries exhausted: raise ParcelServerError\n  \n  _parse_deliveries(items):\
      \ convert ParcelAPIDelivery list → list[ParcelDeliveryDTO]\n    timestamp_expected:\
      \ Unix epoch int → datetime.utcfromtimestamp().replace(tzinfo=UTC)\n    raw\
      \ date strings passed through verbatim (DM-BR-025)\n    raw_response: store\
      \ full original API response dict (DM-BR-004)\n  \n  Base URL: https://api.parcel.app\n\
      \  TLS: verify=True (system trust store)\n\nDeliverables: app/infrastructure/parcel_api/client.py,\
      \ app/infrastructure/parcel_api/schemas.py, __init__.py.\nAcceptance criteria:\
      \ HTTP 429 raises ParcelRateLimitError (no retry). HTTP 503 retries up to 3\
      \ times. API key never appears in any log output. Empty deliveries list returned\
      \ without error. timestamp_expected epoch converted to timezone-aware UTC datetime."
