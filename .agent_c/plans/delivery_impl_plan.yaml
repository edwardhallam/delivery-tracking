    context: "Architecture ref: ARCH-OVERVIEW §1 (context), ARCH-PRESENTATION §3.\
      \ Requirements: DEPLOY-REQ-029–034, SEC-REQ-031–034, SEC-REQ-041–044, ADR-005.\n\
      \nFile: nginx/nginx.conf (HTTP mode — default):\n  server {\n    listen 80;\n\
      \    root /usr/share/nginx/html;\n    index index.html;\n\n    # SPA routing:\
      \ try file, then SPA fallback (DEPLOY-REQ-029–030)\n    location / {\n     \
      \ try_files $uri $uri/ /index.html;\n    }\n\n    # Static assets: aggressive\
      \ caching for Vite hashed filenames (DEPLOY-REQ-031)\n    location ~* \\.(js|css|png|svg|ico|woff2?)$\
      \ {\n      expires 1y;\n      add_header Cache-Control \"public, immutable\"\
      ;\n    }\n\n    # API proxy (DEPLOY-REQ-029)\n    location /api/ {\n      proxy_pass\
      \ http://api:8000;\n      proxy_set_header Host $host;\n      proxy_set_header\
      \ X-Real-IP $remote_addr;       (DEPLOY-REQ-032, SEC-REQ-040)\n      proxy_set_header\
      \ X-Forwarded-For $proxy_add_x_forwarded_for;  (DEPLOY-REQ-032)\n      proxy_set_header\
      \ X-Forwarded-Proto $scheme;\n    }\n\n    # Security headers (SEC-REQ-032–033)\n\
      \    add_header X-Frame-Options DENY always;\n    add_header X-Content-Type-Options\
      \ nosniff always;\n    add_header Content-Security-Policy \"default-src 'self';\
      \ script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src\
      \ 'self'; img-src 'self' data:; font-src 'self'\" always;\n    add_header Referrer-Policy\
      \ strict-origin-when-cross-origin always;\n\n    # Suppress server version (SEC-REQ-034)\n\
      \    server_tokens off;\n  }\n\nFile: nginx/nginx-https.conf (optional HTTPS\
      \ mode — DEPLOY-REQ-034):\n  server { listen 80; return 301 https://$host$request_uri;\
      \ }  (SEC-REQ-042: HTTP→HTTPS redirect)\n  server {\n    listen 443 ssl;\n \
      \   ssl_protocols TLSv1.2 TLSv1.3;  (SEC-REQ-042)\n    ssl_certificate /etc/nginx/certs/fullchain.pem;\n\
      \    ssl_certificate_key /etc/nginx/certs/privkey.pem;\n    ... (same location\
      \ blocks as nginx.conf above)\n    add_header Strict-Transport-Security \"max-age=31536000\"\
      \ always;\n  }\n\nNginx worker process does NOT run as root (SEC-REQ-050) —\
      \ achieved by nginx:alpine default config.\n\nDeliverables: nginx/nginx.conf,\
      \ nginx/nginx-https.conf.\nAcceptance criteria: /api/ requests proxied to api:8000.\
      \ / serves index.html with SPA fallback. X-Real-IP forwarded. Security headers\
      \ present on all responses. server_tokens off."
