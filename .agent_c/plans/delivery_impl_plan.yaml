    title: 7.3 — Nginx configuration
    description: Write the Nginx configuration for HTTP mode (default) and the optional
      HTTPS configuration. Nginx serves the React SPA, proxies /api/* to the FastAPI
      backend, forwards client IP headers, and adds security headers to all responses.
    priority: medium
