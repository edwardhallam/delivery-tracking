  limbo-jamaica:
    id: limbo-jamaica
    title: 3.5 — Polling use case (PollAndSyncUseCase)
    description: 'Implement the most complex use case: the 4-phase polling orchestrator.
      This is the heart of the service — it coordinates the Parcel API call, change
      detection against the DB snapshot, transactional writes, and poll log finalisation.'
    priority: high
    completed: true
    parent_id: money-joshua
    context: "Architecture ref: ARCH-APPLICATION §4.6 (full 4-phase spec), ARCH-OVERVIEW\
      \ §7.1 (data flow). Requirements: POLL-REQ-003–036.\n\nFile: app/application/use_cases/polling/poll_and_sync.py\n\
      \nPHASE 1 — Setup (before API call):\n  poll_log = await poll_log_repo.create_in_progress(started_at=utcnow())\
      \  (DM-BR-018)\n  snapshot = await delivery_repo.get_snapshot()  — single query,\
      \ O(1) lookup (POLL-REQ-015)\n\nPHASE 2 — Parcel API Call:\n  try: deliveries\
      \ = await parcel_client.get_deliveries()\n  except ParcelRateLimitError: log\
      \ WARNING, complete poll ERROR, return  (POLL-REQ-024)\n  except ParcelAuthError:\
      \ log CRITICAL, complete poll ERROR, return  (POLL-REQ-025)\n  except ParcelServerError:\
      \ log ERROR (all retries exhausted), complete poll ERROR, return\n  Empty list\
      \ is valid (POLL-REQ-014) — not an error condition\n\nPHASE 3 — Change Detection\
      \ (sequential, NOT parallel — POLL-REQ-021):\n  counters = {new: 0, status_changes:\
      \ 0, new_events: 0, errors: 0}\n  for parcel_delivery in deliveries:\n    try:\
      \  # per-delivery transaction (POLL-REQ-019)\n      semantic_status = normalize_status(parcel_delivery.parcel_status_code)\n\
      \      if UNKNOWN: log WARNING with poll_id  (POLL-REQ-023, POLL-REQ-034)\n\n\
      \      key = (parcel_delivery.tracking_number, parcel_delivery.carrier_code)\n\
      \      if key NOT in snapshot:  # NEW DELIVERY\n        new_delivery = Delivery(...)\
      \  # build domain entity\n        await delivery_repo.create(new_delivery)\n\
      \        initial_history = StatusHistory(prev=None, new=semantic_status, poll_log_id=poll_log.id)\n\
      \        await delivery_repo.create_status_history(initial_history)  (DM-BR-010)\n\
      \        for event in parcel_delivery.events:\n          await delivery_repo.create_event(DeliveryEvent(...))\
      \  # ON CONFLICT DO NOTHING\n        counters.new += 1\n      else:  # EXISTING\
      \ DELIVERY\n        existing = await delivery_repo.get_by_id(snapshot[key])\n\
      \        if existing.parcel_status_code != parcel_delivery.parcel_status_code:\
      \  # STATUS CHANGED\n          # Check for anomalous terminal transition (NORM-REQ-005)\n\
      \          old_group = get_lifecycle_group(existing.semantic_status)\n     \
      \     new_group = get_lifecycle_group(semantic_status)\n          if old_group\
      \ == LifecycleGroup.TERMINAL and new_group != LifecycleGroup.TERMINAL:\n   \
      \         raise AnomalousStatusTransitionError(...)  # caught below, logged,\
      \ NOT discarded\n          await delivery_repo.create_status_history(StatusHistory(prev=existing.semantic_status,\
      \ new=semantic_status))\n          counters.status_changes += 1\n        for\
      \ event in parcel_delivery.events:\n          result = await delivery_repo.create_event(DeliveryEvent(...))\n\
      \          if result: counters.new_events += 1\n        existing.last_seen_at\
      \ = utcnow()  # ALWAYS update (POLL-REQ-018)\n        existing.parcel_status_code\
      \ = parcel_delivery.parcel_status_code\n        existing.semantic_status = semantic_status\n\
      \        # ... update all mutable fields\n        await delivery_repo.update(existing)\n\
      \    except AnomalousStatusTransitionError as e:\n      log WARNING  # still\
      \ persisted (NORM-REQ-005–006)\n      # Continue with the update anyway — do\
      \ NOT skip\n    except Exception as e:\n      log ERROR with (tracking_number,\
      \ carrier_code, error, poll_id)  (POLL-REQ-029)\n      counters.errors += 1\
      \  # continue to next delivery\n\nPHASE 4 — Finalise (SEPARATE transaction,\
      \ POLL-REQ-020):\n  outcome = PollOutcome.SUCCESS if counters.errors == 0 else\
      \ PollOutcome.PARTIAL  (POLL-REQ-030)\n  await poll_log_repo.complete(poll_log.id,\
      \ outcome, utcnow(), counters...)\n\nCRITICAL: The use case NEVER raises. All\
      \ errors are caught, logged, and reflected in PollLog.\nEvery log entry within\
      \ a cycle MUST include poll_id (POLL-REQ-034).\n\nDeliverables: app/application/use_cases/polling/poll_and_sync.py,\
      \ __init__.py.\nAcceptance criteria: New delivery creates StatusHistory with\
      \ prev=None. Status change creates new StatusHistory entry. Duplicate event\
      \ returns None from create_event, no error. Per-delivery failure logs ERROR\
      \ and continues (counters.errors increments). Poll log always completed (even\
      \ on partial failure). Anomalous terminal transition logged WARNING but delivery\
      \ still updated."
    child_tasks: []
    created_at: '2026-04-01T12:46:26.564028'
    updated_at: '2026-04-01T12:46:26.564035'
    completed_at: '2026-04-01T13:56:27.954775'
    completion_report: 'Implemented poll_and_sync.py + __init__.py. Full 4-phase orchestrator:
      Phase 1 creates IN_PROGRESS poll log and loads snapshot; Phase 2 calls parcel_client.get_deliveries()
      with specific handling for RateLimitError (WARNING), AuthError (CRITICAL), ServerError
      (ERROR); Phase 3 iterates deliveries sequentially with per-delivery error isolation
      (counters.errors++, continue), handles NEW deliveries (create + initial StatusHistory
      with prev=None + events), EXISTING deliveries (status change detection, anomalous
      terminal transition logged WARNING but update persisted, event upsert with new_events
      counter, full mutable field update including last_seen_at); Phase 4 finalises
      poll log in separate transaction. Use case never raises.'
