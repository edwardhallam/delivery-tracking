      \ if settings.admin_password else None\n\n    if not username or not password:\n\
      \      logger.critical(\"DB empty but ADMIN_USERNAME/ADMIN_PASSWORD not configured\"\
      )\n      sys.exit(1)  # DEPLOY-REQ-028; entrypoint set -e will abort container\n\
      \n    if len(password) < 12:\n      logger.critical(\"ADMIN_PASSWORD must be\
      \ at least 12 characters (SEC-REQ-005)\")\n      sys.exit(1)\n\n    # Hash password\
      \ with bcrypt (SEC-REQ-001–003)\n    from passlib.context import CryptContext\n\
      \    pwd_context = CryptContext(schemes=[\"bcrypt\"], deprecated=\"auto\",\n\
      \                               bcrypt__rounds=settings.bcrypt_rounds)\n   \
      \ password_hash = pwd_context.hash(password)\n\n    # Create user\n    session.add(UserORM(username=username,\
      \ password_hash=password_hash,\n                        is_active=True, token_version=1))\n\
      \    await session.commit()\n    logger.warning(\n      \"Initial admin user\
      \ created. \"\n      \"IMPORTANT: Remove ADMIN_PASSWORD from .env file now.\"\
      \n    )  # SEC-REQ-004: warn that password should be removed\n\nif __name__\
      \ == \"__main__\":\n  import asyncio\n  asyncio.run(seed_initial_user())\n\n\
      Key security requirements:\n  - password NEVER logged (SEC-REQ-061)\n  - bcrypt\
      \ cost = settings.bcrypt_rounds (≥ 12 — SEC-REQ-001)\n  - Idempotent: safe to\
      \ run on every container start (DEPLOY-REQ-027)\n  - Non-zero exit if DB empty\
      \ AND no creds (DEPLOY-REQ-028)\n\nDeliverables: app/seed.py.\nAcceptance criteria:\
      \ Running on non-empty DB = no-op (returns 0). Running on empty DB without creds\
      \ = exit 1. Running on empty DB with creds = creates user with bcrypt hash.\
      \ Created user has token_version=1. Password not logged at any level."
