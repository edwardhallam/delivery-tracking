      \  AuthenticateUserUseCase(user_repo: AbstractUserRepository, settings: Settings-like\
      \ or just bcrypt_rounds)\n  execute(credentials: LoginCredentialsDTO) → User:\n\
      \    1. user_repo.get_by_username(credentials.username)\n    2. If user None:\
      \ passlib dummy_verify(credentials.password, DUMMY_HASH)  → raise InvalidCredentialsError\n\
      \       CRITICAL: dummy verify MUST run to prevent timing attack (SEC-REQ-008)\n\
      \       DUMMY_HASH = bcrypt hash of a known string; computed once at module\
      \ load time\n    3. passlib.verify(credentials.password, user.password_hash)\n\
      \       Failure → raise InvalidCredentialsError\n    4. If not user.is_active\
      \ → raise AccountDisabledError\n    5. await user_repo.update_last_login(user.id)\
      \  (API-REQ-007)\n    6. return user\n\nFile: app/application/use_cases/auth/refresh_token.py\n\
      \  RefreshAccessTokenUseCase(user_repo: AbstractUserRepository)\n  execute(claims:\
      \ RefreshTokenClaimsDTO) → User:\n    1. user_repo.get_by_username(claims.sub)\
      \ → None: raise UserNotFoundError\n    2. not user.is_active → raise AccountDisabledError\n\
      \    3. user.token_version != claims.token_version → raise TokenVersionMismatchError\
      \ (API-REQ-008)\n    4. return user\n\nFile: app/application/use_cases/auth/logout_user.py\n\
      \  LogoutUserUseCase(user_repo: AbstractUserRepository)\n  execute(user_id:\
      \ int) → None:\n    1. user_repo.increment_token_version(user_id)  (atomic,\
      \ SEC-REQ-021, API-REQ-009)\n       DB errors propagate — do not swallow\n\n\
      passlib import IS allowed in application layer (not a framework import in Clean\
      \ Architecture terms — it's a utility library). Alternatively, inject a password\
      \ verifier as a callable to keep the use case fully mockable; either approach\
      \ acceptable.\n\nDeliverables: 3 use case files + app/application/use_cases/auth/__init__.py.\n\
      Acceptance criteria: Dummy verify fires when username not found (verify with\
      \ mock where get_by_username returns None). Inactive user raises AccountDisabledError\
