  neutral-grid:
    id: neutral-grid
    title: 4.6 — Carrier cache
    description: Implement the in-memory carrier name cache with a 24-hour TTL. The
      cache must serve stale data gracefully rather than erroring when the TTL has
      expired, and silently retain existing data when a refresh attempt fails.
    priority: medium
    completed: true
    parent_id: chamber-open
    context: "Architecture ref: ARCH-INFRASTRUCTURE §7. Requirements: API-REQ-019–020.\n\
      \nFile: app/infrastructure/parcel_api/carrier_cache.py — CarrierCache(AbstractCarrierCache):\n\
      \  __init__(self, client: httpx.AsyncClient)\n  _carriers: list[CarrierDTO]\
      \ = []\n  _cached_at: Optional[datetime] = None\n  _ttl_hours: int = 24\n\n\
      \  get_carriers() → CarrierListDTO:\n    if not _cached_at: return CarrierListDTO(carriers=[],\
      \ cached_at=None, cache_status='unavailable')\n    age = utcnow() - _cached_at\n\
      \    status = 'fresh' if age.total_seconds() < _ttl_hours*3600 else 'stale'\n\
      \    return CarrierListDTO(carriers=_carriers, cached_at=_cached_at, cache_status=status)\n\
      \    — STALE data is returned WITHOUT error (API-REQ-020)\n\n  async refresh()\
      \ → None:\n    try:\n      response = await client.get(\"https://api.parcel.app/external/supported_carriers.json\"\
      , timeout=10.0)\n      response.raise_for_status()\n      data = response.json()\
      \  — dict of {code: name}\n      _carriers = [CarrierDTO(code=k, name=v) for\
      \ k, v in data.items()]\n      _cached_at = utcnow()\n    except Exception:\n\
      \      log WARNING \"Carrier cache refresh failed; retaining existing cache\"\
      \n      # Existing _carriers preserved — never cleared on failure (API-REQ-020)\n\
      \nThe carrier cache refresh is registered as a separate 24h interval job in\
      \ APScheduler\n(task 4.7). Initial population is attempted during lifespan startup\
      \ as a non-blocking task.\n\nNo authentication needed for the carriers endpoint\
      \ (Assumption A-09 in master requirements).\n\nDeliverables: app/infrastructure/parcel_api/carrier_cache.py.\n\
      Acceptance criteria: get_carriers() returns 'unavailable' before first refresh.\
      \ get_carriers() returns 'stale' after TTL expired. Failed refresh retains previous\
      \ data. No synchronous HTTP call made by get_carriers()."
    child_tasks: []
