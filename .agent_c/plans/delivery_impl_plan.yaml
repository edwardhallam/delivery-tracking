      \n  from apscheduler.schedulers.asyncio import AsyncIOScheduler\n  from apscheduler.triggers.interval\
      \ import IntervalTrigger\n\n  def register_poll_job(scheduler, parcel_client,\
      \ settings):\n    scheduler.add_job(\n      func=_run_poll_cycle,\n      args=[parcel_client],\n\
      \      trigger=IntervalTrigger(minutes=settings.poll_interval_minutes,\n   \
      \                           jitter=settings.poll_jitter_seconds),  # ±30s (non-negotiable)\n\
      \      id=\"poll_and_sync\",\n      max_instances=1,    — overlapping poll dropped\
      \ with WARNING (POLL-REQ-032)\n      coalesce=True,\n      misfire_grace_time=60,\n\
      \      replace_existing=True,\n    )\n\n  def register_carrier_refresh_job(scheduler,\
      \ carrier_cache):\n    scheduler.add_job(carrier_cache.refresh, trigger=IntervalTrigger(hours=24),\
      \ id=\"carrier_refresh\")\n\n  async def _run_poll_cycle(parcel_client):\n \
      \   \"\"\"Creates a fresh DB session for each poll cycle. Session is separate\
      \ from HTTP request sessions.\"\"\"\n    async with async_session_factory()\
      \ as session:\n      delivery_repo = SQLAlchemyDeliveryRepository(session)\n\
      \      poll_log_repo = SQLAlchemyPollLogRepository(session)\n      use_case\
      \ = PollAndSyncUseCase(delivery_repo, poll_log_repo, parcel_client)\n      await\
      \ use_case.execute()\n    # any unhandled exception here is caught by APScheduler\
      \ and logged\n\n  Cold-start (POLL-REQ-003): NOT triggered by scheduler — triggered\
      \ by main.py lifespan:\n    asyncio.create_task(_run_poll_cycle(parcel_client))\
      \  — runs in background while HTTP serving begins\n    POLL-REQ-004: This does\
      \ NOT count against the interval; first scheduled poll fires\n             \
      \     POLL_INTERVAL_MINUTES after the cold-start completes\n\n  APSchedulerStateAdapter(AbstractSchedulerState):\n\
      \    — wraps an AsyncIOScheduler instance to implement the abstract interface\n\
      \    is_running() → scheduler.running\n    get_next_poll_at() → scheduler.get_job(\"\
      poll_and_sync\").next_run_time or None\n\n  Shutdown: scheduler.shutdown(wait=True)\
      \ allows in-progress poll up to grace period (POLL-REQ-002)\n\nDeliverables:\
      \ app/infrastructure/scheduler/polling_scheduler.py, __init__.py.\nAcceptance\
      \ criteria: scheduler.add_job called with max_instances=1. IntervalTrigger has\
      \ jitter parameter set. _run_poll_cycle creates a new session per call. APSchedulerStateAdapter.is_running()\
      \ delegates to scheduler.running. Cold-start is asyncio.create_task (non-blocking)."
