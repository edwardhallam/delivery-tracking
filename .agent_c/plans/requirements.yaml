      Must cover: password hashing, JWT or session tokens, token expiry, protected
      routes, CORS policy, HTTPS considerations for self-hosted.'
    child_tasks: []
    created_at: '2026-04-01T10:48:52.306675'
    updated_at: '2026-04-01T10:48:52.306680'
    completed_at: '2026-04-01T11:26:06.070818'
    completion_report: 'Delivered authentication and security requirements at //delivery-tracking/docs/requirements/07-auth-security.md.
      61 requirements defined (SEC-REQ-001 through SEC-REQ-061) covering: threat model
      for self-hosted single-user deployment; bcrypt cost factor ≥12 with passlib,
      constant-time comparison with dummy verify on unknown username; JWT HS256 with
      32-char minimum secret, 6-step token validation chain, type-claim confusion
      prevention; token_version invalidation mechanism (no blocklist needed); refresh
      token httpOnly cookie with SameSite=Strict scoped to /api/auth; CORS disabled
      in production (same-origin via Nginx), development-only with specific origins;
      HTTP security headers (X-Content-Type-Options, X-Frame-Options, CSP with connect-src
      self); brute force protection (10 failed/15min/IP, memory-based, Retry-After
      header, only counts failures); optional HTTPS via Nginx with TLS 1.2+ enforcement
      and HTTP→HTTPS redirect; secrets management (.env.example, startup validation,
      weak-secrets rejection); Docker hardening (non-root containers, no exposed postgres
      port, pinned image versions, no secrets in Dockerfiles); SQLAlchemy parameterised
      queries, Pydantic validation; security audit logging; pre-deployment checklist;
      out-of-scope items documented.'
    completion_signoff_by: Rita
    requires_completion_signoff: 'true'
    lessons_learned: []
    active: false
