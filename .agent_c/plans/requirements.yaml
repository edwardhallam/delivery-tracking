      and indexing strategy.'
    priority: high
    completed: true
    parent_id: null
    context: 'Inputs: Parcel API Delivery and Event schemas from api-reference.md,
      full history retention requirement.

      Deliverable: //delivery-tracking/docs/requirements/02-data-model.md with entity
      diagrams (Mermaid ERD), field specs, constraints, and migration strategy notes.

      Key entities: Delivery, DeliveryEvent, StatusHistory, User.

      Must capture: carrier_code enrichment, timezone-ambiguous date fields, status
      code→enum mapping.'
    child_tasks: []
    created_at: '2026-04-01T10:48:23.670047'
    updated_at: '2026-04-01T10:48:23.670050'
    completed_at: '2026-04-01T10:54:11.129478'
    completion_report: 'Delivered data model requirements at //delivery-tracking/docs/requirements/02-data-model.md.


      Five entities defined: Delivery (core package entity with upsert-on-tracking-number+carrier-code),
      DeliveryEvent (append-only event log with deduplication fingerprint), StatusHistory
      (immutable status change audit log), User (single-user credentials with bcrypt),
      PollLog (operational polling history). Full field specs, types, nullability,
      constraints, and 26 business rules documented. Mermaid ERD included. Status
      code → SemanticStatus mapping table with lifecycle groupings (Active/Attention/Terminal).
      Date/timezone handling strategy documented (raw strings stored verbatim, epoch
      timestamps preferred for sorting). Alembic migration strategy with startup sequence.
      Carrier code enrichment decision: client-side, not stored in DB.'
    completion_signoff_by: Rita
    requires_completion_signoff: 'true'
    lessons_learned: []
    active: false
  spark-forget:
    id: spark-forget
    title: Phase 3 — Polling Service Requirements
    description: 'Define requirements for the background polling subsystem: scheduling,
      rate limit compliance, change detection, error handling, and retry logic.'
    priority: high
    completed: true
    parent_id: null
    context: 'Inputs: Parcel API rate limit (20 req/hr), polling interval (15 min),
      single Parcel API key, full history retention.

      Deliverable: //delivery-tracking/docs/requirements/03-polling-service.md

      Key areas: scheduler setup, API key management, diff/change-detection algorithm,
      status transition detection, error + retry strategy, startup behaviour (cold
      start).'
    child_tasks: []
    created_at: '2026-04-01T10:48:31.529689'
    updated_at: '2026-04-01T10:48:31.529693'
    completed_at: '2026-04-01T11:03:29.463537'
    completion_report: 'Delivered polling service requirements at //delivery-tracking/docs/requirements/03-polling-service.md.
      36 requirements defined (POLL-REQ-001 through POLL-REQ-036) covering: APScheduler
      setup with 15-min interval + ±30s jitter + max_instances=1 overlap guard; cold-start
      immediate poll on every app start; API key management (env var only, never logged);
      filter_mode=recent rationale; pre-poll DB snapshot strategy (avoids N+1 queries);
      change detection algorithm (new vs existing, status diff, event deduplication
      via ON CONFLICT DO NOTHING); per-delivery transaction boundaries with partial
      failure handling; 4-tier error classification with retry strategy (exponential
      backoff: 15s/60s/120s, max 3 attempts); rate limit and auth failure handling;
      structured logging requirements with poll_id correlation; health/observability
      indicators including consecutive_errors degraded state; two sequence diagrams
      (normal cycle + retryable error).'
    completion_signoff_by: Rita
    requires_completion_signoff: 'true'
    lessons_learned: []
    active: false
