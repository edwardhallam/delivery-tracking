includes:
- //config/tools/workspace/shell_exec/*
commands:
  mkdir:
    always_allowed:
    - -p *
  python3:
    subcommands:
      '*':
        always_allowed:
        - ''
    always_allowed:
    - -m *
    - -c *
  ls:
    always_allowed:
    - ''
  .venv/bin/pip:
    subcommands:
      install:
        always_allowed:
        - '*'
