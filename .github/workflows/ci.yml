name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  deps-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install -r api/requirements.txt
