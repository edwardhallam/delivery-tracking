# DEPLOY-REQ-001: All services on shared bridge network
# DEPLOY-REQ-004: api depends_on postgres with condition: service_healthy
# DEPLOY-REQ-005: restart: unless-stopped on all services

services:

  postgres:
    image: postgres:16.13-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data  # DEPLOY-REQ-015
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - delivery_network
    healthcheck:  # DEPLOY-REQ-035
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - delivery_network
    # DEPLOY-REQ-002: No ports exposed on host
    healthcheck:  # DEPLOY-REQ-036
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:  # DEPLOY-REQ-038
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"  # DEPLOY-REQ-003
    depends_on:
      - api
    networks:
      - delivery_network
    healthcheck:  # DEPLOY-REQ-037
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:  # DEPLOY-REQ-038
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  delivery_network:
    driver: bridge

volumes:
  postgres_data:  # DEPLOY-REQ-016
    driver: local
