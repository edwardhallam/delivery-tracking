# Nginx HTTPS configuration — optional TLS mode.
#
# Use this configuration when running behind a domain with TLS certificates
# (e.g., Let's Encrypt / Certbot).  It is NOT enabled by default — the
# default Dockerfile uses nginx.conf (HTTP only).
#
# ── How to activate ───────────────────────────────────────────────────────────
# 1. In frontend/Dockerfile, change:
#      COPY nginx.conf /etc/nginx/conf.d/default.conf
#    to:
#      COPY nginx-https.conf /etc/nginx/conf.d/default.conf
#
# 2. In docker-compose.yml, add to the frontend service:
#      ports:
#        - "${FRONTEND_HTTP_PORT:-80}:80"     # HTTP → HTTPS redirect
#        - "443:443"                          # HTTPS
#      volumes:
#        - /path/to/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
#        - /path/to/privkey.pem:/etc/nginx/certs/privkey.pem:ro
#
# 3. In .env, set:
#      HTTPS_ENABLED=true
#      COOKIE_SECURE=true
#
# Requirements: DEPLOY-REQ-034, SEC-REQ-031–034, SEC-REQ-041–044, ADR-005

# ── HTTP → HTTPS redirect (SEC-REQ-042) ──────────────────────────────────────
server {
    listen      80;
    server_name _;

    server_tokens off;

    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    server_name _;

    # ── TLS configuration (SEC-REQ-042–043) ──────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_certificate           /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key       /etc/nginx/certs/privkey.pem;

    # ── Suppress server version disclosure (SEC-REQ-034) ─────────────────────
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Security headers (SEC-REQ-032–033) ───────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'"
        always;

    # ── API reverse proxy (DEPLOY-REQ-029, DEPLOY-REQ-032, SEC-REQ-040) ──────
    location /api/ {
        proxy_pass            http://api:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets — aggressive caching (DEPLOY-REQ-031) ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── React SPA — client-side routing fallback (DEPLOY-REQ-029–030) ────────
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
