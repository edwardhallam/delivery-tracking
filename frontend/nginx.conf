# Nginx HTTP configuration — default mode.
#
# Responsibilities:
#   - Serves the React SPA with client-side routing fallback (DEPLOY-REQ-029–030)
#   - Proxies /api/* to the FastAPI service (DEPLOY-REQ-029)
#   - Forwards real client IP for rate-limiting (DEPLOY-REQ-032, SEC-REQ-040)
#   - Aggressive caching for Vite content-hashed static assets (DEPLOY-REQ-031)
#   - Adds security headers on all responses (SEC-REQ-032–033)
#   - Suppresses Nginx version disclosure (SEC-REQ-034)
#
# To enable HTTPS: swap nginx-https.conf into the Dockerfile COPY line and
# update docker-compose.yml to expose port 443 with certificate mounts.
# See nginx-https.conf for details.
#
# Requirements: DEPLOY-REQ-029–034, SEC-REQ-031–034, SEC-REQ-040–041, ADR-005

server {
    listen 80;
    server_name _;

    # ── Suppress server version disclosure (SEC-REQ-034) ─────────────────────
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Security headers (SEC-REQ-032–033) ───────────────────────────────────
    # Applied to all responses including API proxy responses.
    add_header X-Frame-Options            "DENY"                                    always;
    add_header X-Content-Type-Options     "nosniff"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'"
        always;

    # ── API reverse proxy (DEPLOY-REQ-029, DEPLOY-REQ-032, SEC-REQ-040) ──────
    location /api/ {
        proxy_pass            http://api:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets — aggressive caching (DEPLOY-REQ-031) ──────────────────
    # Vite generates content-hashed filenames so 1-year immutable caching is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── React SPA — client-side routing fallback (DEPLOY-REQ-029–030) ────────
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
